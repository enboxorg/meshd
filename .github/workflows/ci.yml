name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  GOTOOLCHAIN: auto
  GOFLAGS: -mod=vendor

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit Tests
        run: go test ./... -count=1 -race -coverprofile=coverage.out -covermode=atomic

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          fail_ci_if_error: false

  integration:
    runs-on: ubuntu-latest
    needs: test
    # Only run integration tests on push to main (requires DWN_ENDPOINT secret).
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Integration Tests
        env:
          DWN_ENDPOINT: ${{ secrets.DWN_ENDPOINT }}
        run: |
          if [ -z "$DWN_ENDPOINT" ]; then
            echo "DWN_ENDPOINT not configured, skipping integration tests"
            exit 0
          fi
          go test ./internal/dwn/ -run TestIntegration -v -count=1 -timeout 120s
          go test ./internal/mesh/ -run TestE2E -v -count=1 -timeout 180s
          go test ./cmd/meshd/ -run TestCLIInviteJoinFlow -v -count=1 -timeout 180s

      - name: Engine Connectivity Tests (with retry)
        env:
          DWN_ENDPOINT: ${{ secrets.DWN_ENDPOINT }}
        run: |
          if [ -z "$DWN_ENDPOINT" ]; then
            echo "DWN_ENDPOINT not configured, skipping"
            exit 0
          fi
          for attempt in 1 2 3; do
            echo "==> Attempt $attempt/3"
            if go test ./internal/engine/ -run TestTwoNode -v -count=1 -timeout 300s; then
              exit 0
            fi
            echo "==> Attempt $attempt failed, retrying..."
            sleep 5
          done
          echo "==> All 3 attempts failed"
          exit 1
