name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  GOTOOLCHAIN: auto
  GOFLAGS: -mod=vendor

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit Tests
        run: go test ./... -count=1 -race

  integration:
    runs-on: ubuntu-latest
    needs: test
    # Only run integration tests on push to main (not on PRs from forks).
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Integration Tests
        env:
          DWN_ENDPOINT: ${{ secrets.DWN_ENDPOINT }}
        run: |
          if [ -z "$DWN_ENDPOINT" ]; then
            echo "DWN_ENDPOINT not configured, skipping integration tests"
            exit 0
          fi
          go test ./internal/dwn/ -run TestIntegration -v -count=1 -timeout 120s
          go test ./internal/mesh/ -run TestE2E -v -count=1 -timeout 180s
