name: Release Artifacts

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x64
            goos: linux
            goarch: amd64
            ext: tar.gz
          - os: linux
            arch: arm64
            goos: linux
            goarch: arm64
            ext: tar.gz
          - os: darwin
            arch: x64
            goos: darwin
            goarch: amd64
            ext: tar.gz
          - os: darwin
            arch: arm64
            goos: darwin
            goarch: arm64
            ext: tar.gz
          - os: windows
            arch: x64
            goos: windows
            goarch: amd64
            ext: zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Build binary
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist/release
          out='dist/release/dwn-mesh'
          if [ "${{ matrix.os }}" = 'windows' ]; then
            out='dist/release/dwn-mesh.exe'
          fi
          go build -trimpath -ldflags='-s -w' -o "$out" ./cmd/dwn-mesh

      - name: Package artifact
        run: |
          artifact="dwn-mesh-${{ matrix.os }}-${{ matrix.arch }}.${{ matrix.ext }}"
          if [ "${{ matrix.ext }}" = 'zip' ]; then
            (cd dist/release && zip -q "../../${artifact}" dwn-mesh.exe)
          else
            (cd dist/release && tar -czf "../../${artifact}" dwn-mesh)
          fi
          echo "artifact=${artifact}" >> "$GITHUB_ENV"

      - name: Upload artifact to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.artifact }}
