name: Release Artifacts

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.0.2)'
        required: true

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x64
            goos: linux
            goarch: amd64
            ext: tar.gz
          - os: linux
            arch: arm64
            goos: linux
            goarch: arm64
            ext: tar.gz
          - os: darwin
            arch: x64
            goos: darwin
            goarch: amd64
            ext: tar.gz
          - os: darwin
            arch: arm64
            goos: darwin
            goarch: arm64
            ext: tar.gz
          - os: windows
            arch: x64
            goos: windows
            goarch: amd64
            ext: zip
          - os: windows
            arch: arm64
            goos: windows
            goarch: arm64
            ext: zip
          - os: freebsd
            arch: x64
            goos: freebsd
            goarch: amd64
            ext: tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Build binary
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist/release
          out='dist/release/meshd'
          if [ "${{ matrix.os }}" = 'windows' ]; then
            out='dist/release/meshd.exe'
          fi
          tag="${{ github.event.inputs.tag || github.event.release.tag_name }}"
          version="${tag#v}"
          go build -trimpath -ldflags="-s -w -X main.version=${version}" -o "$out" ./cmd/meshd

      - name: Package artifact
        run: |
          artifact="meshd-${{ matrix.os }}-${{ matrix.arch }}.${{ matrix.ext }}"
          if [ "${{ matrix.ext }}" = 'zip' ]; then
            (cd dist/release && zip -q "../../${artifact}" meshd.exe)
          else
            (cd dist/release && tar -czf "../../${artifact}" meshd)
          fi
          echo "artifact=${artifact}" >> "$GITHUB_ENV"

      - name: Upload artifact to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.event.release.tag_name }}
          files: ${{ env.artifact }}

  install-smoke:
    name: Smoke test public installer
    needs: build-and-upload
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install latest release via meshd.sh
        env:
          MESHD_INSTALL_REQUESTED_VERSION: ${{ github.event.inputs.tag }}
          MESHD_INSTALL_EXPECTED_VERSION: ${{ github.event.inputs.tag || github.event.release.tag_name }}
        run: ./scripts/e2e/install-smoke.sh
