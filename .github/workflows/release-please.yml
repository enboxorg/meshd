name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: go
          token: ${{ secrets.GITHUB_TOKEN }}

  build-artifacts:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    # darwin targets build on a macOS runner so the Mach-O binaries are ad-hoc
    # code-signed; Apple Silicon SIGKILLs unsigned binaries. Everything else
    # cross-compiles on Linux.
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x64
            goos: linux
            goarch: amd64
            ext: tar.gz
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            goos: linux
            goarch: arm64
            ext: tar.gz
            runner: ubuntu-latest
          - os: darwin
            arch: x64
            goos: darwin
            goarch: amd64
            ext: tar.gz
            runner: macos-15-intel
          - os: darwin
            arch: arm64
            goos: darwin
            goarch: arm64
            ext: tar.gz
            runner: macos-15
          - os: windows
            arch: x64
            goos: windows
            goarch: amd64
            ext: zip
            runner: ubuntu-latest
          - os: windows
            arch: arm64
            goos: windows
            goarch: arm64
            ext: zip
            runner: ubuntu-latest
          - os: freebsd
            arch: x64
            goos: freebsd
            goarch: amd64
            ext: tar.gz
            runner: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Build meshd
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist/release
          out='dist/release/meshd'
          if [ "${{ matrix.os }}" = 'windows' ]; then
            out='dist/release/meshd.exe'
          fi
          version="${{ needs.release-please.outputs.tag_name }}"
          version="${version#v}"
          go build -trimpath -ldflags="-s -w -X main.version=${version}" -o "$out" ./cmd/meshd

      - name: Build tray companion
        if: matrix.os == 'darwin' || matrix.os == 'windows'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          version="${{ needs.release-please.outputs.tag_name }}"
          version="${version#v}"
          if [ "${{ matrix.os }}" = 'darwin' ]; then
            MESHD_TRAY_LDFLAGS="-s -w -X main.version=${version}" \
              ./scripts/build-macos-tray.sh "$version" dist/release/meshd-tray.app
          else
            CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -H=windowsgui -X main.version=${version}" -o dist/release/meshd-tray.exe ./cmd/meshd-tray
          fi

      - name: Ad-hoc code-sign (macOS)
        if: matrix.os == 'darwin'
        run: |
          codesign --force --sign - dist/release/meshd
          codesign --verify --verbose dist/release/meshd
          version="${{ needs.release-please.outputs.tag_name }}"
          ./scripts/verify-macos-tray.sh dist/release/meshd-tray.app "${version#v}"

      - name: Package artifact
        run: |
          artifact="meshd-${{ matrix.os }}-${{ matrix.arch }}.${{ matrix.ext }}"
          if [ "${{ matrix.ext }}" = 'zip' ]; then
            (cd dist/release && zip -q "../../${artifact}" meshd.exe meshd-tray.exe)
          elif [ "${{ matrix.os }}" = 'darwin' ]; then
            (cd dist/release && tar -czf "../../${artifact}" meshd meshd-tray.app)
            verify_dir="$(mktemp -d)"
            tar -xzf "$artifact" -C "$verify_dir"
            version="${{ needs.release-please.outputs.tag_name }}"
            ./scripts/verify-macos-tray.sh "$verify_dir/meshd-tray.app" "${version#v}"
            rm -rf "$verify_dir"
          else
            (cd dist/release && tar -czf "../../${artifact}" meshd)
          fi
          echo "artifact=${artifact}" >> "$GITHUB_ENV"

      - name: Upload artifact to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: ${{ env.artifact }}

  install-smoke:
    name: Smoke test public installer
    needs:
      - release-please
      - build-artifacts
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install latest release via meshd.sh
        env:
          MESHD_INSTALL_EXPECTED_VERSION: ${{ needs.release-please.outputs.tag_name }}
          MESHD_INSTALL_FALLBACK_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ needs.release-please.outputs.tag_name }}/install.sh
        run: ./scripts/e2e/install-smoke.sh
